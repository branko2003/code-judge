server:
  port: 8080

application:
  security:
    jwt:
      secret-key: MasdfadsfSAFsafasfSDFAsdafayhhdfdwxdfasdfasfFSAF
      expiration: 8640000 # a day
      refresh-token:
        expiration: 604800000 # 7 days

asyncProcess:
  corePoolSize: 30
  maxPoolSize: 100
  queueCapacity: 1000

spring:
  application:
    name: codejudge
  datasource:
    url: jdbc:postgresql://localhost:5432/codejudge
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true

